let model='osi', qtype='random', Q=null, answered=false;
let score=0, rnd=1, streak=0;

function setModel(m,btn){
  model=m;
  document.querySelectorAll('#model-row .cbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(!answered) nextQ();
}
function setQType(t,btn){
  qtype=t;
  document.querySelectorAll('#mode-row .cbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(!answered) nextQ();
}

/* ═══════════════════════════════════════════════════════
   QUESTION GENERATION
═══════════════════════════════════════════════════════ */
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=ri(0,i);[r[i],r[j]]=[r[j],r[i]];}return r;}

function pickWrong(correct, n) {
  const pool = ITEMS.filter(it => it.id !== correct.id);
  const shuffled = shuffle(pool);
  /* Try to include at least one from same OSI layer for difficulty */
  const same = shuffled.filter(it=>it.osi===correct.osi);
  const diff = shuffled.filter(it=>it.osi!==correct.osi);
  const result = [];
  if(same.length>0) result.push(same[0]);
  for(const it of diff){ if(result.length>=n) break; result.push(it); }
  return shuffle(result).slice(0,n);
}

function genQ(){
  const t = qtype==='random' ? (Math.random()<.5?'layer':'protocol') : qtype;
  const item = ITEMS[ri(0,ITEMS.length-1)];
  if(t==='layer'){
    return { type:'layer', item };
  } else {
    const wrong = pickWrong(item, 3);
    return { type:'protocol', item, options: shuffle([item,...wrong]) };
  }
}

═══════════════════════════════════════════════════════ */
function osiLayerName(n){ return `Layer ${n}: ${OSI[n-1].name}`; }
function tcpLayerName(n){ return `Layer ${n}: ${TCPIP[n-1].name}`; }
function tcpNum(tcpipName){ return TCPIP.findIndex(l=>l.name===tcpipName)+1; }

function renderQ(){
  answered=false;
  document.getElementById('explain').classList.remove('visible');
  document.getElementById('nxtbtn').style.display='none';
  document.getElementById('skipbtn').style.display='';

  const tag = document.getElementById('q-type-tag');
  const main = document.getElementById('q-main');
  const sub  = document.getElementById('q-sub');
  const area = document.getElementById('answer-area');

  if(Q.type==='layer'){
    const mLabel = model==='osi'?'OSI':'TCP/IP';
    tag.textContent = `Name → Layer Match (${mLabel})`;
    main.innerHTML = `<div class="q-subject">${Q.item.name}</div>`;
    sub.textContent = `Which ${mLabel} layer does ${Q.item.name} operate at?`;

    const layers = model==='osi' ? OSI : TCPIP;
    area.innerHTML = `<div class="layers-grid">${
      layers.map(l=>`<button class="layer-btn" id="lb${l.num}" onclick="handleLayerClick(${l.num})">
        <div class="ln">Layer ${l.num}</div>
        <div class="lname">${l.name}</div>
      </button>`).join('')
    }</div>`;

  } else {
    tag.textContent = 'Description → Protocol Match';
    main.innerHTML = `<div class="q-prompt">${Q.item.qd}</div>`;
    sub.textContent = 'Which protocol or technology matches this description?';

    area.innerHTML = `<div class="opts-grid">${
      Q.options.map(opt=>`<button class="opt-card" id="ob${opt.id}" onclick="handleProtocolClick('${opt.id}')">
        ${opt.name}
      </button>`).join('')
    }</div>`;
  }
}

/* ═══════════════════════════════════════════════════════
   ANSWER HANDLING
═══════════════════════════════════════════════════════ */
function showExplain(item, wasCorrect){
  const osi_l = OSI[item.osi-1];
  const tcp_l = TCPIP.findIndex(l=>l.name===item.tcpip)+1;
  document.getElementById('ex-name').textContent = item.name + (item.port ? ` — Port ${item.port}` : '');
  document.getElementById('ex-layer').textContent =
    `OSI Layer ${item.osi}: ${osi_l.name}  |  TCP/IP Layer ${tcp_l}: ${item.tcpip}`;
  document.getElementById('ex-desc').textContent = item.desc;
  document.getElementById('explain').classList.add('visible');
}

function finishRound(correct){
  answered=true;
  if(correct){ score++;streak++; }else{ streak=0; }
  rnd++;
  document.getElementById('sc').textContent=score;
  document.getElementById('str').textContent=streak;
  document.getElementById('rnd').textContent=rnd;
  document.getElementById('nxtbtn').style.display='';
  document.getElementById('skipbtn').style.display='none';
  showExplain(Q.item, correct);
}

function handleLayerClick(num){
  if(answered) return;
  const correctNum = model==='osi' ? Q.item.osi : tcpNum(Q.item.tcpip);
  /* Disable all buttons */
  document.querySelectorAll('.layer-btn').forEach(b=>b.disabled=true);
  document.getElementById('lb'+num).classList.add(num===correctNum?'correct':'wrong');
  if(num!==correctNum) document.getElementById('lb'+correctNum).classList.add('correct');
  finishRound(num===correctNum);
}

function handleProtocolClick(id){
  if(answered) return;
  document.querySelectorAll('.opt-card').forEach(b=>b.disabled=true);
  document.getElementById('ob'+id).classList.add(id===Q.item.id?'correct':'wrong');
  if(id!==Q.item.id) document.getElementById('ob'+Q.item.id).classList.add('correct');
  finishRound(id===Q.item.id);
}

function skipQ(){
  if(answered) return;
  /* Reveal the correct answer without scoring */
  answered=true; streak=0; rnd++;
  document.getElementById('str').textContent=streak;
  document.getElementById('rnd').textContent=rnd;
  if(Q.type==='layer'){
    document.querySelectorAll('.layer-btn').forEach(b=>b.disabled=true);
    const cn = model==='osi'?Q.item.osi:tcpNum(Q.item.tcpip);
    document.getElementById('lb'+cn).classList.add('correct');
  } else {
    document.querySelectorAll('.opt-card').forEach(b=>b.disabled=true);
    document.getElementById('ob'+Q.item.id).classList.add('correct');
  }
  showExplain(Q.item, false);
  document.getElementById('nxtbtn').style.display='';
  document.getElementById('skipbtn').style.display='none';
}

function nextQ(){ Q=genQ(); renderQ(); }
function resetGame(){ score=0;rnd=1;streak=0; nextQ(); }

/* ═══════════════════════════════════════════════════════
   OPTIONS
═══════════════════════════════════════════════════════ */
function toggleOpts(){
  const m=document.getElementById('opt-menu');
  const b=document.getElementById('opt-btn');
  const o=m.classList.toggle('open');b.classList.toggle('open',o);
}
function toggleTool(id){
  const cb=document.getElementById('tog-'+id);cb.checked=!cb.checked;applyTools();
}
function applyTools(){
  const s=document.getElementById('tog-ref').checked;
  document.getElementById('t-ref').style.display=s?'':'none';
  document.getElementById('toolsec').style.display=s?'':'none';
}
document.addEventListener('click',e=>{
  const w=document.getElementById('opt-btn').closest('.opt-wrap');
  if(!w.contains(e.target)){
    document.getElementById('opt-menu').classList.remove('open');
    document.getElementById('opt-btn').classList.remove('open');
  }
});

/* ═══════════════════════════════════════════════════════
   REFERENCE PANEL
═══════════════════════════════════════════════════════ */
function buildRef(){
  const el=document.getElementById('ref-content');
  let html='';

  /* OSI Layers section */
  html+='<div class="ref-section-hdr">OSI Model — 7 Layers</div><div class="ref-grid" id="rg-osi">';
  OSI.forEach(l=>{
    const tcp_n=TCPIP.findIndex(t=>t.name===l.tcpip)+1;
    html+=`<div class="ref-card" data-search="layer ${l.num} ${l.name.toLowerCase()} ${l.tcpip.toLowerCase()} ${l.examples.toLowerCase()}">
      <div class="ref-card-top">
        <div class="ref-card-name">Layer ${l.num}: ${l.name}</div>
        <div class="ref-badges"><span class="rbadge rb-tcp">TCP/IP L${tcp_n}</span></div>
      </div>
      <div class="ref-card-desc">${l.desc}<br><em style="color:var(--text-t)">e.g. ${l.examples}</em></div>
    </div>`;
  });
  html+='</div>';

  /* TCP/IP Layers section */
  html+='<div class="ref-section-hdr">TCP/IP Model — 4 Layers</div><div class="ref-grid" id="rg-tcp">';
  TCPIP.forEach(l=>{
    html+=`<div class="ref-card" data-search="tcp ip layer ${l.num} ${l.name.toLowerCase()} ${l.osi.toLowerCase()} ${l.examples.toLowerCase()}">
      <div class="ref-card-top">
        <div class="ref-card-name">Layer ${l.num}: ${l.name}</div>
        <div class="ref-badges"><span class="rbadge rb-osi">OSI ${l.osi}</span></div>
      </div>
      <div class="ref-card-desc">${l.desc}<br><em style="color:var(--text-t)">e.g. ${l.examples}</em></div>
    </div>`;
  });
  html+='</div>';

  /* Protocols section */
  html+='<div class="ref-section-hdr">Protocols &amp; Technologies</div><div class="ref-grid" id="rg-items">';
  const byLayer=[...ITEMS].sort((a,b)=>a.osi-b.osi);
  byLayer.forEach(it=>{
    const tcp_n=TCPIP.findIndex(t=>t.name===it.tcpip)+1;
    html+=`<div class="ref-card" data-search="${it.name.toLowerCase()} ${it.cat.toLowerCase()} ${it.desc.toLowerCase()} ${it.qd.toLowerCase()} ${it.port||''} osi ${it.osi} ${OSI[it.osi-1].name.toLowerCase()} ${it.tcpip.toLowerCase()}">
      <div class="ref-card-top">
        <div class="ref-card-name">${it.name}</div>
        <div class="ref-badges">
          <span class="rbadge rb-osi">OSI L${it.osi}</span>
          <span class="rbadge rb-tcp">TCP/IP L${tcp_n}</span>
          ${it.port?`<span class="rbadge rb-port">:${it.port}</span>`:''}
        </div>
      </div>
      <div class="ref-card-desc">${it.desc}</div>
    </div>`;
  });
  html+='</div><div class="ref-empty" id="ref-empty" style="display:none">No results found</div>';

  el.innerHTML=html;
}

function filterRef(q){
  const term=q.toLowerCase().trim();
  const cards=document.querySelectorAll('#ref-content .ref-card');
  let visible=0;
  cards.forEach(c=>{
    const match=!term||c.dataset.search.includes(term);
    c.classList.toggle('hidden',!match);
    if(match)visible++;
  });
  /* Show/hide section headers based on children */
  ['rg-osi','rg-tcp','rg-items'].forEach(id=>{
    const grid=document.getElementById(id);
    if(!grid)return;
    const anyVisible=[...grid.querySelectorAll('.ref-card')].some(c=>!c.classList.contains('hidden'));
    grid.style.display=anyVisible?'':'none';
    const hdr=grid.previousElementSibling;
    if(hdr&&hdr.classList.contains('ref-section-hdr')) hdr.style.display=anyVisible?'':'none';
  });
  document.getElementById('ref-empty').style.display=visible===0?'block':'none';
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(answered)nextQ();}
  if(e.key==='Escape'){
    document.getElementById('opt-menu').classList.remove('open');
    document.getElementById('opt-btn').classList.remove('open');
  }
});

   INIT
═══════════════════════════════════════════════════════ */
buildRef();
nextQ();
</script>
